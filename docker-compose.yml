

services:
  db:
    image: postgres:15-alpine
    container_name: fitpass_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: fitpass_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:alpine
    container_name: fitpass_redis
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data: